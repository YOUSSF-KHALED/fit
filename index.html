<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FITFEAST Swipe Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Montserrat',sans-serif;
  color:#fff;

  /* بدل الأسود الخام */
  background:
    radial-gradient(circle at 20% 20%, rgba(34,197,94,0.22), transparent 35%),
    radial-gradient(circle at 80% 80%, rgba(239,68,68,0.22), transparent 35%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.04), transparent 45%),
    linear-gradient(180deg,#0b0b0b 0%, #050505 40%, #000 100%);
}

/* cinematic moving light */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 30% 30%, rgba(34,197,94,0.18), transparent 25%),
    radial-gradient(circle at 70% 70%, rgba(239,68,68,0.18), transparent 25%);
  filter:blur(120px);
  opacity:.9;
  animation:floatGlow 12s ease-in-out infinite alternate;
  z-index:-2;
}

/* noise layer (ده سر الفخامة الحقيقي) */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background-image:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:.05;
  z-index:-1;
  pointer-events:none;
}

@keyframes floatGlow{
  0%{transform:translate(-30px,-30px) scale(1);}
  100%{transform:translate(30px,30px) scale(1.1);}
}body{
  height:100vh;
  overflow:hidden;
  font-family:'Montserrat',sans-serif;
  color:#fff;

  /* بدل الأسود الخام */
  background:
    radial-gradient(circle at 20% 20%, rgba(34,197,94,0.22), transparent 35%),
    radial-gradient(circle at 80% 80%, rgba(239,68,68,0.22), transparent 35%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.04), transparent 45%),
    linear-gradient(180deg,#0b0b0b 0%, #050505 40%, #000 100%);
}

/* cinematic moving light */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 30% 30%, rgba(34,197,94,0.18), transparent 25%),
    radial-gradient(circle at 70% 70%, rgba(239,68,68,0.18), transparent 25%);
  filter:blur(120px);
  opacity:.9;
  animation:floatGlow 12s ease-in-out infinite alternate;
  z-index:-2;
}

/* noise layer (ده سر الفخامة الحقيقي) */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background-image:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:.05;
  z-index:-1;
  pointer-events:none;
}

@keyframes floatGlow{
  0%{transform:translate(-30px,-30px) scale(1);}
  100%{transform:translate(30px,30px) scale(1.1);}
}

/* HEADER */
header{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  z-index:10;
}

header h1{
  font-family:'Bebas Neue';
  font-size:3rem;
  letter-spacing:4px;
}

header span:first-child{color:#22c55e;}
header span:last-child{color:#ef4444;}

header p{
  font-size:.7rem;
  opacity:.7;
  letter-spacing:3px;
}

/* SWIPE WRAPPER */
.wrapper{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CARD */
.card{
  position:absolute;
  width:90%;
  max-width:380px;
  height:70vh;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
  transition:transform .3s ease;
  touch-action:none;
}

/* BACKGROUND IMAGE */
.card img{
  width:100%;
  height:60%;
  object-fit:cover;
}

/* CONTENT */
.content{
  padding:18px;
  text-align:center;
}

h2{
  font-family:'Bebas Neue';
  font-size:3rem;
  letter-spacing:3px;
}

p{
  font-size:.9rem;
  opacity:.8;
  margin-top:5px;
}

button{
  margin-top:12px;
  padding:12px 24px;
  border-radius:999px;
  border:none;
  color:#fff;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(10px);
}

/* COLORS */
.healthy{
  background:linear-gradient(135deg,#14532d,#22c55e);
}

.cheat{
  background:linear-gradient(135deg,#7f1d1d,#ef4444);
}

/* STACK EFFECT */
.card:nth-child(1){
  transform:translateY(0px) scale(1);
  z-index:2;
}

.card:nth-child(2){
  transform:translateY(40px) scale(.95);
  z-index:1;
}

/* SWIPE ANIMATION STATES */
.swiping{
  transition:none;
}

/* small hint */
.hint{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  font-size:.7rem;
  opacity:.5;
}
</style>
</head>

<body>

<header>
  <h1><span>FIT</span><span>WAY</span></h1>
  <p>Swipe up or down to choose</p>
</header>

<div class="wrapper">

  <!-- HEALTHY -->
  <div class="card healthy" id="card1">
    <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe" />
    <div class="content">
      <h2>HEALTHY</h2>
      <p>Clean • Fresh • Balanced</p>
      <button>Explore Menu</button>
    </div>
  </div>

  <!-- CHEAT -->
  <div class="card cheat" id="card2">
    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" />
    <div class="content">
      <h2>CHEAT</h2>
      <p>Loaded • Crispy • Bold</p>
      <button>Indulge Now</button>
    </div>
  </div>

</div>

<div class="hint">Swipe cards ↑ ↓</div>

<script>
let startY = 0;
let currentY = 0;
let active = 0;

const cards = document.querySelectorAll('.card');

document.addEventListener("touchstart",(e)=>{
  startY = e.touches[0].clientY;
});

document.addEventListener("touchmove",(e)=>{
  currentY = e.touches[0].clientY;
});

document.addEventListener("touchend",()=>{
  let diff = startY - currentY;

  if(Math.abs(diff) > 50){
    if(diff > 0){
      nextCard();
    }else{
      prevCard();
    }
  }
});

function update(){
  cards.forEach((c,i)=>{
    c.style.transform = i === active
      ? "translateY(0) scale(1)"
      : "translateY(60px) scale(.92)";
    c.style.zIndex = i === active ? 2 : 1;
  });
}

function nextCard(){
  if(active < cards.length-1){
    active++;
    update();
  }
}

function prevCard(){
  if(active > 0){
    active--;
    update();
  }
}

update();
</script>

</body>
</html>
